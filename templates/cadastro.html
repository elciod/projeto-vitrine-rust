<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastre-se - Vitrine Universal</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Estilo rápido para o campo de Cidade/UF ficarem na mesma linha */
        .endereco-linha { display: flex; gap: 10px; margin-bottom: 10px; }
        .endereco-linha input[name="cidade"] { flex: 3; }
        .endereco-linha input[name="estado"] { flex: 1; text-transform: uppercase; }
        .alert-erro { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Criar Nova Conta</h2>

        <!-- Bloco de Feedback de Erro -->
        {% if erro %}
            <div class="alert-erro">{{ erro }}</div>
        {% endif %}


        <!------------------------------ajuste----------------------------------------------->

        <form action="/cadastro" method="post">
    <!-- 1. Dados de Identificação -->
    <input type="text" name="nome" placeholder="Nome Completo" required>
    <input type="email" name="email" placeholder="E-mail (Seu Login)" required>
    
    <!-- 2. Segurança (Senhas) -->
    <input type="password" name="password" placeholder="Crie uma Senha" required>
    <input type="password" name="password_confirm" placeholder="Confirme sua Senha" required>
    
    <hr> <!-- Divisor para Endereço -->
    
    <!-- 3. Localização e Endereço -->
    <input type="text" name="cep" placeholder="CEP" required>
    <input type="text" name="rua" placeholder="Rua/Logradouro" required>
    <input type="text" name="numero" placeholder="Número" required>
    
    <!-- Campos Opcionais (Option no Rust) -->
    <input type="text" name="complemento" placeholder="Complemento (Opcional)">
    <input type="text" name="referencia" placeholder="Ponto de Referência (Opcional)">
    
    <!-- 4. Cidade e Estado -->
    <input type="text" name="cidade" placeholder="Cidade" required>
    <input type="text" name="estado" placeholder="Estado (Ex: BA)" required>

    <button type="submit" style="margin-top: 20px;">Finalizar Cadastro</button>
</form>
