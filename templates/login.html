<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vitrine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card p-4 shadow" style="width: 400px; border-radius: 15px;">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Identifique-se</h3>
                <span class="badge bg-info text-dark">Passo 1 de 3</span>
            </div>
            
            <div class="alert alert-warning py-2 small" role="alert">
                Atenção: Seu endereço de entrega será carregado automaticamente após o login.
            </div>

            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            </form>
            
            <hr>
            <div class="text-center">
                <p class="mb-1">Ainda não tem conta?</p>
                <a href="/cadastro" class="btn btn-outline-success btn-sm w-100">Criar Novo Cadastro</a>
            </div>
            <a href="/" class="d-block text-center mt-3 text-muted text-decoration-none small">← Voltar para a Loja</a>
        </div>
    </div>
</body>
</html>
